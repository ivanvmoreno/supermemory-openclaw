name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    name: Validate plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check required files exist
        run: |
          set -euo pipefail
          for f in index.ts openclaw.plugin.json package.json README.md; do
            if [ ! -f "$f" ]; then
              echo "ERROR: Missing required file: $f"
              exit 1
            fi
          done
          echo "All required files present."

      - name: Validate plugin manifest
        run: |
          set -euo pipefail
          if ! grep -q '"kind": "memory"' openclaw.plugin.json; then
            echo "ERROR: openclaw.plugin.json must have kind: memory"
            exit 1
          fi
          echo "Plugin manifest is valid."

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: 2.3.8

      - name: Run TypeScript type checking
        run: bun run check-types

      - name: Run Biome lint
        run: biome lint .

  publish-npm:
    name: Publish to npm (Trusted Publishing)
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          check-latest: true
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@latest

      - name: Verify release toolchain
        run: |
          set -euo pipefail
          echo "node $(node -v)"
          echo "npm $(npm -v)"
          node <<'EOF'
          const [major, minor] = process.versions.node.split(".").map(Number);
          if (major < 24 && !(major === 22 && minor >= 14)) {
            console.error("npm trusted publishing requires Node 22.14.0 or newer.");
            process.exit(1);
          }
          EOF
          node -e '
            const [major, minor, patch] = process.argv[1].split(".").map(Number);
            const unsupported =
              major < 11 ||
              (major === 11 && minor < 5) ||
              (major === 11 && minor === 5 && patch < 1);
            if (unsupported) {
              console.error("npm trusted publishing requires npm 11.5.1 or newer.");
              process.exit(1);
            }
          ' "$(npm -v)"

      - name: Set version from tag
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Check package contents
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish

  github-release:
    name: Create GitHub Release
    needs: publish-npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Build release archive
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="openclaw-memory-supermemory-${VERSION}.zip"
          zip -r "$ARCHIVE" index.ts openclaw.plugin.json package.json README.md biome.json tsconfig.json src/
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ env.VERSION }}"
          generate_release_notes: true
          files: ${{ env.ARCHIVE }}
